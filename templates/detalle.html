<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VANTTI - Secciones Inteligentes</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; padding: 30px; }
        .card { background: white; max-width: 700px; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .nav-sections { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .btn { padding: 10px 20px; text-decoration: none; background: #007bff; color: white; border-radius: 20px; font-weight: bold; }
        .btn:hover { background: #0056b3; }
        .ia-box { background: #f0f7ff; border-left: 5px solid #007bff; padding: 20px; margin-top: 20px; border-radius: 8px; white-space: pre-line; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="text-align: center;">🥛 Catálogo VANTTI</h1>
        
        <div class="nav-sections">
            <a href="?seccion=Queso Oaxaca" class="btn">Quesos</a>
            <a href="?seccion=Crema de Leche" class="btn">Cremas</a>
            <a href="?seccion=Yogurt de Fresa" class="btn">Yogurts</a>
        </div>

        <hr>

        <h2>Viendo: {{ producto_activo }}</h2>
        
        <div class="ia-box">
            <strong>✨ Sugerencia de vanIA:</strong><br><br>
            {{ sugerencia }}
        </div>
    </div>
</body>
</html>
