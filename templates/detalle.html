<div style="font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px;">
    <h1>🔍 Buscador de Recetas VANTTI</h1>
    
    <form method="GET" action="/" style="margin-bottom: 30px;">
        <input type="text" name="q" placeholder="Ej. Queso Panela, Crema, Leche..." 
               value="{{ busqueda }}" style="padding: 10px; width: 70%; border-radius: 5px; border: 1px solid #ccc;">
        <button type="submit" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Consultar a vanIA
        </button>
    </form>

    {% if busqueda %}
        <div style="background-color: #f8f9fa; border-radius: 10px; padding: 20px; border: 1px solid #e9ecef;">
            <h2 style="color: #333;">Resultados para: {{ busqueda }}</h2>
            <hr>
            <div style="white-space: pre-line; line-height: 1.6; color: #444;">
                {{ sugerencias }}
            </div>
        </div>
    {% else %}
        <p>Escribe el nombre de un producto lácteo para que vanIA te dé ideas de cocina.</p>
    {% endif %}
</div>
